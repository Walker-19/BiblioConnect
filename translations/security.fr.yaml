# Surcharge des messages d'erreur d'authentification Symfony
'An authentication exception occurred.': "Une erreur d'authentification est survenue."
'Authentication credentials could not be found.': "Identifiants introuvables. Veuillez vous reconnecter."
'Authentication request could not be processed due to a system problem.': "La connexion a échoué en raison d'un problème technique. Réessayez plus tard."
'Invalid credentials.': "Email ou mot de passe incorrect. Vérifiez vos informations et réessayez."
'Cookie has already been used by someone else.': "Ce lien de connexion a déjà été utilisé."
'Not privileged to request the resource.': "Vous n'avez pas accès à cette ressource."
'Invalid CSRF token.': "Formulaire expiré. Veuillez recharger la page et réessayer."
'No authentication provider found to support the authentication token.': "Méthode d'authentification non prise en charge."
'No token could be found.': "Session expirée. Veuillez vous reconnecter."
'Username could not be found.': "Aucun compte trouvé avec cette adresse e-mail."
'Account has expired.': "Votre compte a expiré. Contactez l'administrateur."
'Credentials have expired.': "Votre mot de passe a expiré. Veuillez le réinitialiser."
'Account is disabled.': "Votre compte est désactivé. Contactez l'administrateur."
'Account is locked.': "Votre compte est verrouillé. Contactez l'administrateur."
'Too many failed login attempts, please try again later.': "Trop de tentatives échouées. Veuillez réessayer dans quelques minutes."
